name: CI

# Runs the docs/threads/testing.md "Required Checks" — crucially the
# ThreadSanitizer gates, which cannot run on a macOS dev box (the bundled libcxx
# fails the TSan runtime compile with `undeclared identifier 'INFINITY'`) but
# work on Linux. This is the gate that surfaces the no-GIL races blocking the
# execution-path GIL drop.
#
# Triggers are pull_request + manual dispatch (not every push to main). Add
# `push: { branches: [main] }` once the suite is green on main (the toolchain
# pin is confirmed to resolve; see the `gate` matrix below).
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Each Required Check runs as its own matrix leg (fail-fast: false), so an
  # unrelated failure in one (e.g. the full unit suite) does not mask the
  # threading / ThreadSanitizer gates.
  gate:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: unit
            cmd: zig build test
          - name: threads-gil
            cmd: zig build threads-test
          - name: threads-nogil-witness
            cmd: zig build threads-test -Dthreads-parallel-js=true -Dthreads-case=sync/condition-wait-notify.js
          - name: tsan-unit
            cmd: zig build test -Dtsan=true
          - name: tsan-parallel-js
            cmd: zig build test -Dtsan=true -Dtest-filter=parallel_js
    steps:
      # build.zig.zon uses local-path deps (`../zig-regex`, `../zig-gc`), so the
      # sibling repos are checked out next to this one.
      - uses: actions/checkout@v6
        with:
          path: zig-js
      - uses: actions/checkout@v6
        with:
          repository: zig-utils/zig-regex
          path: zig-regex
      - uses: actions/checkout@v6
        with:
          repository: zig-utils/zig-gc
          path: zig-gc
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.17.0-dev.131+73c51c142
      - name: ${{ matrix.name }}
        working-directory: zig-js
        run: ${{ matrix.cmd }}

  # Informational: the whole-corpus TSan probe that surfaces the residual no-GIL
  # races (the emergent api/blocking-gate settlement race, the semantics-batch
  # StringHashMap-grow panic). Allowed to fail until those are driven to zero —
  # its TSan report is the data for the next fix.
  tsan-corpus-probe:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          path: zig-js
      - uses: actions/checkout@v6
        with:
          repository: zig-utils/zig-regex
          path: zig-regex
      - uses: actions/checkout@v6
        with:
          repository: zig-utils/zig-gc
          path: zig-gc
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.17.0-dev.131+73c51c142
      - name: TSan loop over the no-GIL blocking-gate case (pin the emergent race)
        working-directory: zig-js
        env:
          # Stop at the first detected race so its report is the tail of the log.
          TSAN_OPTIONS: halt_on_error=1
        run: |
          # The flake is ~1/40 and emergent, so a single run rarely executes the
          # racy interleaving. Loop until TSan catches it (the build cache-hits
          # after the first compile, so iterations are just the instrumented run).
          for i in $(seq 1 80); do
            echo "=== blocking-gate parallel_js+TSan iter $i ==="
            zig build threads-test -Dtsan=true -Dthreads-parallel-js=true -Dthreads-case=api/blocking-gate.js
          done
          echo "no TSan race observed in 80 iterations"

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: zig-js
      - uses: oven-sh/setup-bun@v2
      - name: docs:build
        working-directory: zig-js
        run: |
          bun install
          bun run docs:build
