name: CI

# Runs the docs/threads/testing.md "Required Checks" — crucially the
# ThreadSanitizer gates that surface the no-GIL races blocking the execution-path
# GIL drop. The toolchain comes from pantry's own action (`zig@0.17.0-dev`),
# which resolves the current 0.17.0-dev master (≥0.17.0-dev.956) from
# ziglang.org/download/index.json — so the pin tracks upstream automatically
# instead of going stale. At ≥dev.956 TSan now builds on macOS too; CI keeps
# running it on Linux as the shared gate. (The older dev.131 pin could not build
# TSan on darwin — bundled libcxx failed with `undeclared identifier 'INFINITY'`
# — which is why this was Linux-only before.)
#
# Triggers are pull_request + manual dispatch (not every push to main). Add
# `push: { branches: [main] }` once the suite is green on main (the toolchain
# pin is confirmed to resolve; see the `gate` matrix below).
on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * *' # nightly continuous validation (incl. the race-hunt probe)

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Each Required Check runs as its own matrix leg (fail-fast: false), so an
  # unrelated failure in one (e.g. the full unit suite) does not mask the
  # threading / ThreadSanitizer gates.
  gate:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: unit
            cmd: zig build test
          - name: threads-gil
            cmd: zig build threads-test
          - name: threads-nogil-witness
            cmd: zig build threads-test -Dthreads-parallel-js=true -Dthreads-case=sync/condition-wait-notify.js
          - name: tsan-unit
            cmd: zig build test -Dtsan=true
          - name: tsan-parallel-js
            cmd: zig build test -Dtsan=true -Dtest-filter=parallel_js
    steps:
      # build.zig.zon uses local-path deps (`../zig-regex`, `../zig-gc`), so the
      # sibling repos are checked out next to this one.
      - uses: actions/checkout@v6
        with:
          path: zig-js
      - uses: actions/checkout@v6
        with:
          repository: zig-utils/zig-regex
          path: zig-regex
      - uses: actions/checkout@v6
        with:
          repository: zig-utils/zig-gc
          path: zig-gc
      - uses: pantry-pm/pantry/packages/action@main
        with:
          packages: zig@0.17.0-dev
      - name: ${{ matrix.name }}
        working-directory: zig-js
        run: ${{ matrix.cmd }}

  # Informational: the whole-corpus TSan probe that surfaces the residual no-GIL
  # races (the emergent api/blocking-gate settlement race, the semantics-batch
  # StringHashMap-grow panic). Allowed to fail until those are driven to zero —
  # its TSan report is the data for the next fix.
  tsan-corpus-probe:
    # The 80x race-hunt is expensive; run it nightly + on manual dispatch, not on
    # every PR. Informational (continue-on-error): its TSan report names a race.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          path: zig-js
      - uses: actions/checkout@v6
        with:
          repository: zig-utils/zig-regex
          path: zig-regex
      - uses: actions/checkout@v6
        with:
          repository: zig-utils/zig-gc
          path: zig-gc
      - uses: pantry-pm/pantry/packages/action@main
        with:
          packages: zig@0.17.0-dev
      - name: TSan loop over the no-GIL race-hunt corpus (pin remaining races)
        working-directory: zig-js
        env:
          # Stop at the first detected race so its report is the tail of the log.
          TSAN_OPTIONS: halt_on_error=1
        run: |
          # Hunt the one remaining no-GIL data-race candidate — the rare
          # StringHashMap-grow panic seen once in the semantics batch (~1/160+) —
          # by looping the batch under TSan. blocking-gate (fixed) is kept as a
          # cheap regression witness. The build cache-hits after the first
          # compile, so each iteration is just the instrumented run.
          SEM="semantics/atom-rope-torture.js,semantics/date-cache-churn.js,semantics/frozen-seal-race.js,semantics/private-fields-shared.js,semantics/proto-cycle-race.js,semantics/regexp-lastindex-shared.js,semantics/symbol-registry-cross-thread.js"
          for i in $(seq 1 40); do
            echo "=== race-hunt parallel_js+TSan iter $i ==="
            zig build threads-test -Dtsan=true -Dthreads-parallel-js=true -Dthreads-case="$SEM"
          done
          echo "=== blocking-gate regression witness ==="
          for i in $(seq 1 20); do
            zig build threads-test -Dtsan=true -Dthreads-parallel-js=true -Dthreads-case=api/blocking-gate.js
          done
          echo "no TSan race observed in 80 iterations"

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: zig-js
      - uses: oven-sh/setup-bun@v2
      - name: docs:build
        working-directory: zig-js
        run: |
          bun install
          bun run docs:build
